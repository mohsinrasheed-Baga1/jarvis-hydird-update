name: Build and Release JARVIS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci
      - name: Build React
        working-directory: desktop-app
        run: npx vite build
      - name: Build and Publish Electron
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-win-build
          path: desktop-app/release/**/*
          retention-days: 30
